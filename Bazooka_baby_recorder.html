<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --panel: #13131e; --border: #2a2a3a;
    --border-active: #7c6fff; --accent: #7c6fff;
    --accent-glow: rgba(124,111,255,0.35); --accent2: #ff6b9d;
    --accent3: #ff4444; --text: #e0deff; --muted: #44445a;
    --cell: 160px; --gap: 12px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px; padding: 40px 32px;
  }
  h1 { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; }
  .grid-wrap { position: relative; display: inline-block; }
  .grid { display: grid; grid-template-columns: repeat(3, var(--cell)); grid-template-rows: repeat(3, var(--cell)); gap: var(--gap); position: relative; z-index: 1; }
  .cell { width: var(--cell); height: var(--cell); background: var(--panel); border: 1.5px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s; user-select: none; }
  .cell:hover { border-color: #4a4a6a; transform: scale(1.02); }
  .cell.active { border-color: var(--border-active); box-shadow: 0 0 0 1px var(--border-active), 0 0 20px var(--accent-glow); }
  .cell.flash { animation: cellFlash 0.2s ease-out; }
  .cell.record-flash { animation: recordFlash 0.25s ease-out; }
  @keyframes cellFlash { 0% { box-shadow: 0 0 0 2px var(--accent), 0 0 32px var(--accent-glow); } 100% { box-shadow: none; } }
  @keyframes recordFlash { 0% { box-shadow: 0 0 0 3px var(--accent3), 0 0 40px rgba(255,68,68,0.5); background: #2a0a0a; } 100% { box-shadow: none; background: var(--panel); } }
  .cell img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; border-radius: 8px; pointer-events: none; }
  .cell-label { font-size: 9px; color: var(--muted); letter-spacing: 0.12em; text-align: center; z-index: 1; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .cell-label svg { opacity: 0.3; }
  .cell.center { cursor: default; border-color: #2e2e44; background: #0c0c16; }
  .cell.center:hover { transform: none; border-color: #2e2e44; }
 
  /* Key hint badge on each cell */
  .key-hint {
    position: absolute;
    top: 6px; left: 7px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.05em;
    z-index: 2;
    pointer-events: none;
    background: rgba(10,10,15,0.65);
    border: 1px solid #2a2a3a;
    border-radius: 4px;
    padding: 2px 5px;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
  }
  /* When recording is active, highlight the key hint */
  body.recording .cell:not(.center) .key-hint {
    color: var(--accent);
    border-color: rgba(124,111,255,0.5);
    background: rgba(124,111,255,0.1);
  }
  /* Key press visual pop */
  .cell.key-press .key-hint {
    color: #fff !important;
    border-color: var(--accent3) !important;
    background: rgba(255,68,68,0.25) !important;
  }
 
  #aimCanvas { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
 
  /* AUDIO */
  .audio-panel { width: 100%; max-width: 560px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .audio-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 0.15em; color: var(--muted); }
  .audio-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  .audio-upload-row { display: flex; align-items: center; gap: 10px; }
  .audio-filename { flex: 1; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .audio-filename.loaded { color: var(--accent); }
  .progress-wrap { position: relative; height: 36px; background: #0d0d18; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; }
  .progress-bar { position: absolute; top: 0; left: 0; height: 100%; background: rgba(124,111,255,0.15); pointer-events: none; }
  .progress-playhead { position: absolute; top: 0; width: 2px; height: 100%; background: var(--accent); pointer-events: none; }
  .beat-marker { position: absolute; top: 0; width: 2px; height: 100%; opacity: 0.7; pointer-events: none; }
  .progress-time { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; letter-spacing: 0.08em; }
  .audio-controls { display: flex; align-items: center; gap: 8px; }
 
  /* BUTTONS */
  .ctrl-btn, label.ctrl-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
    padding: 6px 12px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    display: inline-flex; align-items: center;
  }
  .ctrl-btn:hover, label.ctrl-btn:hover { border-color: var(--accent); background: #1a1a28; }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .ctrl-btn.danger { border-color: var(--accent3); color: var(--accent3); }
  .ctrl-btn.danger:hover { background: rgba(255,68,68,0.1); }
  .ctrl-btn.recording { border-color: var(--accent3); color: var(--accent3); animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
 
  /* TIMING */
  .timing-panel { width: 100%; max-width: 560px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .timing-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 0.15em; color: var(--muted); }
  .timing-header span { color: var(--accent); }
  .timing-rows { display: flex; flex-direction: column; }
  .timing-row { display: grid; grid-template-columns: 110px 1fr 110px 100px; align-items: center; gap: 10px; padding: 9px 18px; border-bottom: 1px solid #1a1a26; transition: background 0.1s; }
  .timing-row:last-child { border-bottom: none; }
  .timing-row:hover { background: #16161f; }
  .timing-row.row-active { background: #1a1828; }
  .row-id { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; display: flex; align-items: center; gap: 8px; }
  .row-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: background 0.15s; }
  .row-dot.has-image { background: var(--accent2) !important; }
  .timing-input-wrap { display: flex; align-items: center; gap: 6px; }
  .timing-input-wrap input[type=range] { flex: 1; height: 3px; appearance: none; background: var(--border); border-radius: 2px; cursor: pointer; outline: none; }
  .timing-input-wrap input[type=range]::-webkit-slider-thumb { appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .timing-input-wrap input[type=range]::-moz-range-thumb { width: 13px; height: 13px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; }
  .timing-val { font-size: 11px; color: var(--text); min-width: 52px; text-align: right; letter-spacing: 0.05em; }
  .upload-btn { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 0.08em; padding: 5px 10px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; transition: border-color 0.15s, color 0.15s; white-space: nowrap; }
  .upload-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .upload-btn.has-image { border-color: #3a3050; color: var(--accent2); }
 
  /* BEATS */
  .beats-panel { width: 100%; max-width: 560px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: none; }
  .beats-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 0.15em; color: var(--muted); }
  .beats-list { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; }
  .beat-entry { display: flex; align-items: center; gap: 10px; padding: 7px 18px; border-bottom: 1px solid #1a1a26; font-size: 10px; color: var(--muted); }
  .beat-entry:last-child { border-bottom: none; }
  .beat-entry .be-idx { color: #333350; min-width: 24px; }
  .beat-entry .be-box { color: var(--accent); min-width: 80px; letter-spacing: 0.08em; }
  .beat-entry .be-time { color: var(--text); min-width: 60px; }
  .beat-entry .be-del { margin-left: auto; cursor: pointer; color: var(--muted); font-size: 13px; padding: 0 4px; transition: color 0.1s; }
  .beat-entry .be-del:hover { color: var(--accent3); }
 
  /* KEY LEGEND */
  .key-legend {
    width: 100%; max-width: 560px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .key-legend-header {
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: 0.15em; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
  }
  .key-legend-body {
    padding: 14px 18px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px 10px;
    font-size: 10px;
  }
  .key-legend-item {
    display: flex; align-items: center; gap: 7px; color: var(--muted);
    letter-spacing: 0.08em;
  }
  .key-badge {
    font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
    background: #0d0d18; border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 7px;
    color: var(--accent); min-width: 28px; text-align: center;
    flex-shrink: 0;
  }
  .key-legend-item .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
 
  /* MISC */
  .shooter-toolbar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 560px; }
  .btn { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 0.08em; padding: 7px 14px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .btn:hover { border-color: var(--accent); background: #1a1a28; }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: var(--accent); color: #fff; }
  .section-label { font-size: 10px; color: var(--muted); letter-spacing: 0.2em; text-align: center; text-transform: uppercase; }
  .status { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; min-height: 16px; text-align: center; }
  .status span { color: var(--accent); }
  .status span.rec { color: var(--accent3); }
  .export-box { width: 100%; max-width: 560px; background: #0d0d18; border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; font-size: 11px; line-height: 1.8; color: #7070a0; white-space: pre; overflow-x: auto; display: none; }
  .export-actions { display: none; gap: 8px; justify-content: center; max-width: 560px; width: 100%; }
  input[type=file] { display: none; }
  .color-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
</style>
</head>
<body>
 
<h1>Rhythm Game &mdash; Template</h1>
 
<input type="file" id="mp3Input" accept="audio/*">
<input type="file" id="imgInput" accept="image/*">
 
<div class="grid-wrap">
  <canvas id="aimCanvas"></canvas>
  <div class="grid" id="grid"></div>
</div>
 
<div class="status" id="status">load an mp3 to begin</div>
 
<div class="section-label">Audio</div>
<div class="audio-panel">
  <div class="audio-header">
    <span>MP3 TRACK</span>
    <span id="audioHeaderTime">—</span>
  </div>
  <div class="audio-body">
    <div class="audio-upload-row">
      <label for="mp3Input" class="ctrl-btn">+ load mp3</label>
      <div class="audio-filename" id="audioFilename">no file loaded</div>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
      <div class="progress-playhead" id="progressPlayhead" style="left:0%"></div>
      <div class="progress-time" id="progressTime">0:00 / 0:00</div>
    </div>
    <div class="audio-controls">
      <button class="ctrl-btn" id="btnPlay" onclick="togglePlay()" disabled>&#9654; play</button>
      <button class="ctrl-btn" id="btnStop" onclick="stopAudio()" disabled>&#9632; stop</button>
      <button class="ctrl-btn" id="btnRecord" onclick="toggleRecord()" disabled>&#9679; record</button>
      <button class="ctrl-btn danger" id="btnClearBeats" onclick="clearBeats()" style="margin-left:auto;" disabled>&#10005; clear beats</button>
    </div>
  </div>
</div>
 
<div class="beats-panel" id="beatsPanel">
  <div class="beats-header">
    <span>RECORDED BEATS &mdash; <span id="beatCount" style="color:var(--accent)">0</span> hits</span>
    <span style="font-size:10px;">press keys while recording</span>
  </div>
  <div class="beats-list" id="beatsList"></div>
</div>
 
<!-- Key legend -->
<div class="key-legend">
  <div class="key-legend-header">
    <span>KEYBOARD MAP &mdash; BEAT INPUT</span>
    <span style="font-size:10px; color:#333350;">active during recording</span>
  </div>
  <div class="key-legend-body" id="keyLegendBody"></div>
</div>
 
<div class="section-label">Shooter images</div>
<div class="shooter-toolbar" id="shooterToolbar"></div>
 
<div class="section-label">Enemy images &amp; spawn timing</div>
<div class="timing-panel">
  <div class="timing-header">
    <span>BOX</span>
    <span style="flex:1;text-align:center;margin:0 10px;">SPAWN TIMING (seconds into song)</span>
    <span>IMAGE</span>
  </div>
  <div class="timing-rows" id="timingRows"></div>
</div>
 
<button class="btn" onclick="toggleExport()" style="align-self:center;">export config &#8595;</button>
<div class="export-actions" id="exportActions">
  <button class="btn primary" onclick="downloadJSON()">&#8659; download .json</button>
  <button class="btn" onclick="copyJSON()">&#9635; copy to clipboard</button>
</div>
<pre class="export-box" id="exportBox"></pre>
 
<script>
const SHOOTER_IMAGES = {
  idle:"images/shooter_idle.png",
  tl:"images/shooter_tl.png", tc:"images/shooter_tc.png", tr:"images/shooter_tr.png",
  ml:"images/shooter_ml.png", mr:"images/shooter_mr.png",
  bl:"images/shooter_bl.png", bc:"images/shooter_bc.png", br:"images/shooter_br.png",
};
 
const CELLS = [
  {id:'tl',label:'TOP-LEFT'},{id:'tc',label:'TOP'},{id:'tr',label:'TOP-RIGHT'},
  {id:'ml',label:'LEFT'},{id:'center',label:'SHOOTER'},{id:'mr',label:'RIGHT'},
  {id:'bl',label:'BOTTOM-LEFT'},{id:'bc',label:'BOTTOM'},{id:'br',label:'BOTTOM-RIGHT'},
];
const DIRS = CELLS.filter(c => c.id !== 'center');
const BOX_COLORS = {
  tl:'#7c6fff',tc:'#ff6b9d',tr:'#6bffda',
  ml:'#ffb86c',mr:'#ff5555',
  bl:'#50fa7b',bc:'#f1fa8c',br:'#8be9fd',
};
 
// ── Key mapping: QWEASDZXC layout ──
const KEY_MAP = {
  KeyQ:'tl', KeyW:'tc', KeyE:'tr',
  KeyA:'ml',            KeyD:'mr',
  KeyZ:'bl', KeyX:'bc', KeyC:'br',
};
// Display labels for the legend
const KEY_DISPLAY = {
  tl:'Q', tc:'W', tr:'E',
  ml:'A',         mr:'D',
  bl:'Z', bc:'X', br:'C',
};
 
const boxState = {};
DIRS.forEach(c => { boxState[c.id] = {imageSrc:null,imageName:null,spawnTime:0}; });
 
let recordedBeats = [];
let activeId      = null;
let pendingImg    = null;
let audio         = null;
let audioDur      = 0;
let isRecording   = false;
let rafId         = null;
let lastJsonStr   = '';
const shooterImages = {...SHOOTER_IMAGES};
 
// DOM refs
const statusEl    = document.getElementById('status');
const mp3Input    = document.getElementById('mp3Input');
const imgInput    = document.getElementById('imgInput');
const canvas      = document.getElementById('aimCanvas');
const ctx         = canvas.getContext('2d');
const progressBar = document.getElementById('progressBar');
const progressPH  = document.getElementById('progressPlayhead');
const progressTime= document.getElementById('progressTime');
const progressWrap= document.getElementById('progressWrap');
const beatsPanel  = document.getElementById('beatsPanel');
const beatsList   = document.getElementById('beatsList');
const beatCountEl = document.getElementById('beatCount');
const audioHdrTime= document.getElementById('audioHeaderTime');
 
// ── Build grid ──
CELLS.forEach(c => {
  const cell = document.createElement('div');
  cell.className = 'cell' + (c.id === 'center' ? ' center' : '');
  cell.id = 'cell-' + c.id;
 
  // Key hint badge (not on center)
  if (c.id !== 'center') {
    const hint = document.createElement('div');
    hint.className = 'key-hint';
    hint.id = 'keyhint-' + c.id;
    hint.textContent = KEY_DISPLAY[c.id];
    cell.appendChild(hint);
  }
 
  cell.innerHTML += `<div class="cell-label" id="label-${c.id}">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="2.5" y="2.5" width="15" height="15" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
      <line x1="10" y1="5.5" x2="10" y2="14.5" stroke="currentColor" stroke-width="1.2"/>
      <line x1="5.5" y1="10" x2="14.5" y2="10" stroke="currentColor" stroke-width="1.2"/>
    </svg>
    <span>${c.label}</span></div>`;
  if (c.id !== 'center') cell.addEventListener('click', () => handleCellClick(c));
  document.getElementById('grid').appendChild(cell);
});
setCenterImage('idle');
 
// ── Key legend ──
const legendBody = document.getElementById('keyLegendBody');
DIRS.forEach(c => {
  const item = document.createElement('div');
  item.className = 'key-legend-item';
  item.id = 'legend-' + c.id;
  item.innerHTML = `
    <span class="key-badge" id="kbadge-${c.id}">${KEY_DISPLAY[c.id]}</span>
    <span class="dot" style="background:${BOX_COLORS[c.id]}"></span>
    <span>${c.label}</span>`;
  legendBody.appendChild(item);
});
 
// ── Shooter toolbar ──
['idle',...DIRS.map(d=>d.id)].forEach(key => {
  const lbl = key==='idle' ? 'idle' : DIRS.find(d=>d.id===key).label.toLowerCase();
  const btn = document.createElement('button');
  btn.className = key==='idle' ? 'btn primary' : 'btn';
  btn.textContent = key==='idle' ? '+ shooter idle' : 'aim \u2192 '+lbl;
  btn.onclick = () => { pendingImg = 'shooter-'+key; imgInput.value=''; imgInput.click(); };
  document.getElementById('shooterToolbar').appendChild(btn);
});
 
// ── Timing rows ──
DIRS.forEach(c => {
  const row = document.createElement('div');
  row.className = 'timing-row';
  row.id = 'row-' + c.id;
  row.innerHTML = `
    <div class="row-id">
      <div class="row-dot" id="dot-${c.id}" style="background:${BOX_COLORS[c.id]}33;border:1px solid ${BOX_COLORS[c.id]}88;"></div>
      <span>${c.label}</span>
    </div>
    <div class="timing-input-wrap">
      <input type="range" id="slider-${c.id}" min="0" max="300" step="0.1" value="0">
    </div>
    <div class="timing-val" id="val-${c.id}">0.0s</div>
    <button class="upload-btn" id="ubtn-${c.id}">+ image</button>`;
  document.getElementById('timingRows').appendChild(row);
 
  document.getElementById('slider-'+c.id).addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    boxState[c.id].spawnTime = v;
    document.getElementById('val-'+c.id).textContent = v.toFixed(1)+'s';
  });
 
  document.getElementById('ubtn-'+c.id).addEventListener('click', () => {
    pendingImg = 'enemy-'+c.id;
    imgInput.value = '';
    imgInput.click();
  });
});
 
// ── MP3 upload ──
mp3Input.addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
 
  if (audio) { audio.pause(); audio = null; }
  cancelAnimationFrame(rafId);
  isRecording = false;
  document.body.classList.remove('recording');
  updateRecordBtn();
  updateProgress(0);
  statusEl.innerHTML = 'loading <span>'+file.name+'</span>...';
 
  audio = new Audio();
  audio.preload = 'auto';
 
  audio.addEventListener('loadedmetadata', function() {
    audioDur = audio.duration;
    audioHdrTime.textContent = formatTime(audioDur);
    document.getElementById('btnPlay').disabled   = false;
    document.getElementById('btnStop').disabled   = false;
    document.getElementById('btnRecord').disabled = false;
    document.getElementById('audioFilename').textContent = file.name;
    document.getElementById('audioFilename').classList.add('loaded');
    DIRS.forEach(c => { document.getElementById('slider-'+c.id).max = Math.ceil(audioDur); });
    statusEl.innerHTML = 'loaded <span>'+file.name+'</span> \u2014 press \u25B6 play, then \u25CF record';
    renderBeatMarkers();
  });
 
  audio.addEventListener('error', function() {
    statusEl.innerHTML = '<span style="color:var(--accent3)">could not load this file (code '+
      (audio.error ? audio.error.code : '?')+')</span>';
  });
 
  audio.addEventListener('ended', function() {
    if (isRecording) { isRecording = false; document.body.classList.remove('recording'); updateRecordBtn(); }
    updatePlayBtn(); cancelAnimationFrame(rafId);
  });
 
  audio.src = URL.createObjectURL(file);
  audio.load();
});
 
// ── Image upload ──
imgInput.addEventListener('change', function() {
  const file = this.files[0];
  if (!file || !pendingImg) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const src = e.target.result;
    if (pendingImg.startsWith('shooter-')) {
      const id = pendingImg.replace('shooter-','');
      shooterImages[id] = src;
      if (id==='idle' && !activeId) setCenterImage('idle');
      else if (activeId===id) setCenterImage(id);
      statusEl.innerHTML = 'shooter image updated: <span>'+id+'</span>';
    } else {
      const id = pendingImg.replace('enemy-','');
      boxState[id].imageSrc = src; boxState[id].imageName = file.name;
      setEnemyImage(id, src);
      const btn = document.getElementById('ubtn-'+id);
      btn.textContent = '\u2713 '+file.name.slice(0,12)+(file.name.length>12?'\u2026':'');
      btn.classList.add('has-image');
      document.getElementById('dot-'+id).classList.add('has-image');
      statusEl.innerHTML = 'enemy image set: <span>'+id+'</span>';
    }
  };
  reader.readAsDataURL(file);
});
 
// ── Cell click ──
function handleCellClick(c) {
  if (isRecording && audio && !audio.paused) { captureBeat(c.id); return; }
 
  const wasActive = activeId === c.id;
  document.querySelectorAll('.cell').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.timing-row').forEach(el => el.classList.remove('row-active'));
  activeId = null; drawAim(null);
 
  if (wasActive) { setCenterImage('idle'); statusEl.innerHTML = 'deselected'; return; }
 
  activeId = c.id;
  const el = document.getElementById('cell-'+c.id);
  el.classList.add('active','flash');
  el.addEventListener('animationend', () => el.classList.remove('flash'), {once:true});
  document.getElementById('row-'+c.id).classList.add('row-active');
  drawAim(c.id); setCenterImage(c.id);
  statusEl.innerHTML = 'aimed at <span>'+c.label+'</span> \u2014 spawn @ <span>'+boxState[c.id].spawnTime.toFixed(1)+'s</span>';
}
 
// ── Beat recording ──
function captureBeat(id) {
  const t = audio.currentTime;
  recordedBeats.push({id, time:t, color:BOX_COLORS[id]});
  recordedBeats.sort((a,b) => a.time - b.time);
 
  // Flash cell
  const el = document.getElementById('cell-'+id);
  el.classList.add('record-flash','key-press');
  el.addEventListener('animationend', () => { el.classList.remove('record-flash','key-press'); }, {once:true});
 
  boxState[id].spawnTime = t;
  document.getElementById('slider-'+id).value = t;
  document.getElementById('val-'+id).textContent = t.toFixed(1)+'s';
  renderBeatsList(); renderBeatMarkers();
  const lbl = CELLS.find(x=>x.id===id).label;
  statusEl.innerHTML = '<span class="rec">\u25CF REC</span> '+lbl+' [<span>'+KEY_DISPLAY[id]+'</span>] @ <span>'+t.toFixed(2)+'s</span>';
}
 
function renderBeatsList() {
  beatsList.innerHTML = '';
  beatsPanel.style.display = recordedBeats.length ? 'block' : 'none';
  beatCountEl.textContent = recordedBeats.length;
  document.getElementById('btnClearBeats').disabled = recordedBeats.length === 0;
  recordedBeats.forEach((b,i) => {
    const lbl = CELLS.find(x=>x.id===b.id).label;
    const div = document.createElement('div');
    div.className = 'beat-entry';
    div.innerHTML = '<span class="be-idx">'+String(i+1).padStart(2,'0')+'</span>'+
      '<span class="be-box"><span class="color-dot" style="background:'+b.color+'"></span>'+lbl+'</span>'+
      '<span style="color:#555;min-width:24px;font-size:9px;">['+KEY_DISPLAY[b.id]+']</span>'+
      '<span class="be-time">'+b.time.toFixed(3)+'s</span>'+
      '<span class="be-del" onclick="deleteBeat('+i+')">\u2715</span>';
    beatsList.appendChild(div);
  });
  beatsList.scrollTop = beatsList.scrollHeight;
}
 
function renderBeatMarkers() {
  progressWrap.querySelectorAll('.beat-marker').forEach(m => m.remove());
  if (!audioDur) return;
  recordedBeats.forEach(b => {
    const m = document.createElement('div');
    m.className = 'beat-marker';
    m.style.cssText = 'left:'+((b.time/audioDur)*100)+'%;background:'+b.color;
    progressWrap.appendChild(m);
  });
}
 
function deleteBeat(i) { recordedBeats.splice(i,1); renderBeatsList(); renderBeatMarkers(); }
 
function clearBeats() {
  if (!confirm('Clear all recorded beats?')) return;
  recordedBeats = []; renderBeatsList(); renderBeatMarkers();
}
 
// ── Playback controls ──
function togglePlay() {
  if (!audio) return;
  if (audio.paused) {
    audio.play().catch(err => {
      statusEl.innerHTML = '<span style="color:var(--accent3)">playback error: '+err.message+'</span>';
    });
    startRaf(); updatePlayBtn();
    if (isRecording) statusEl.innerHTML = '<span class="rec">\u25CF RECORDING</span> \u2014 use Q W E / A D / Z X C keys';
  } else {
    audio.pause(); cancelAnimationFrame(rafId); updatePlayBtn();
  }
}
 
function stopAudio() {
  if (!audio) return;
  audio.pause(); audio.currentTime = 0;
  cancelAnimationFrame(rafId); updateProgress(0); updatePlayBtn();
  if (isRecording) { isRecording = false; document.body.classList.remove('recording'); updateRecordBtn(); }
}
 
function toggleRecord() {
  if (!audio) return;
  isRecording = !isRecording;
  document.body.classList.toggle('recording', isRecording);
  updateRecordBtn();
  if (isRecording) {
    if (audio.paused) {
      audio.currentTime = 0;
      audio.play().catch(()=>{});
      startRaf(); updatePlayBtn();
    }
    statusEl.innerHTML = '<span class="rec">\u25CF RECORDING</span> \u2014 use <span>Q W E</span> / <span>A D</span> / <span>Z X C</span> keys';
  } else {
    statusEl.innerHTML = 'recording stopped \u2014 <span>'+recordedBeats.length+' beats</span> captured';
  }
}
 
function updatePlayBtn() {
  if (!audio) return;
  document.getElementById('btnPlay').textContent = audio.paused ? '\u25B6 play' : '\u2016 pause';
}
 
function updateRecordBtn() {
  const btn = document.getElementById('btnRecord');
  if (isRecording) { btn.textContent = '\u25A0 stop rec'; btn.classList.add('recording'); }
  else             { btn.textContent = '\u25CF record';   btn.classList.remove('recording'); }
}
 
function startRaf() {
  cancelAnimationFrame(rafId);
  (function tick() { if (audio && !audio.paused) { updateProgress(audio.currentTime); rafId = requestAnimationFrame(tick); } })();
}
 
function updateProgress(t) {
  const pct = audioDur ? (t/audioDur)*100 : 0;
  progressBar.style.width = pct+'%';
  progressPH.style.left   = pct+'%';
  progressTime.textContent = formatTime(t)+' / '+formatTime(audioDur);
  audioHdrTime.textContent = formatTime(t)+' / '+formatTime(audioDur);
}
 
progressWrap.addEventListener('click', function(e) {
  if (!audio || !audioDur) return;
  const r = progressWrap.getBoundingClientRect();
  audio.currentTime = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width)) * audioDur;
  updateProgress(audio.currentTime);
});
 
function formatTime(s) {
  if (!isFinite(s)) return '0:00';
  return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
}
 
// ── Shooter / enemy images ──
function setCenterImage(key) {
  const center = document.getElementById('cell-center');
  center.querySelectorAll('img').forEach(i=>i.remove());
  const src = shooterImages[key] || shooterImages['idle'];
  const lbl = document.getElementById('label-center');
  if (src) {
    const img = document.createElement('img');
    img.src = src; img.alt='shooter';
    img.onerror = () => { img.remove(); lbl.style.display=''; };
    center.prepend(img); lbl.style.display = 'none';
  } else { lbl.style.display = ''; }
}
 
function setEnemyImage(id, src) {
  const cell = document.getElementById('cell-'+id);
  cell.querySelectorAll('img').forEach(i=>i.remove());
  if (src) {
    const img = document.createElement('img'); img.src=src; img.alt=id;
    cell.prepend(img);
    document.getElementById('label-'+id).style.display = 'none';
  } else { document.getElementById('label-'+id).style.display = ''; }
}
 
// ── Aim canvas ──
function sizeCanvas() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width; canvas.height = r.height;
}
function drawAim(targetId) {
  sizeCanvas(); ctx.clearRect(0,0,canvas.width,canvas.height);
  if (!targetId) return;
  const wrap = canvas.parentElement.getBoundingClientRect();
  const cR = document.getElementById('cell-center').getBoundingClientRect();
  const tR = document.getElementById('cell-'+targetId).getBoundingClientRect();
  const cx = cR.left-wrap.left+cR.width/2,  cy = cR.top-wrap.top+cR.height/2;
  const tx = tR.left-wrap.left+tR.width/2,  ty = tR.top-wrap.top+tR.height/2;
  ctx.save();
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(tx,ty);
  ctx.strokeStyle='rgba(124,111,255,0.5)'; ctx.lineWidth=1.5; ctx.setLineDash([5,5]); ctx.stroke();
  const angle = Math.atan2(ty-cy,tx-cx);
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(tx,ty);
  ctx.lineTo(tx-9*Math.cos(angle-0.4), ty-9*Math.sin(angle-0.4));
  ctx.lineTo(tx-9*Math.cos(angle+0.4), ty-9*Math.sin(angle+0.4));
  ctx.closePath(); ctx.fillStyle='rgba(124,111,255,0.75)'; ctx.fill();
  ctx.restore();
}
window.addEventListener('resize', () => { if (activeId) drawAim(activeId); });
 
// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
 
  // Space = play/pause
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); return; }
  // R = toggle record
  if (e.code === 'KeyR')  { e.preventDefault(); toggleRecord(); return; }
 
  // Beat capture keys (QWEASDZXC) — active during recording
  if (isRecording && audio && !audio.paused && KEY_MAP[e.code]) {
    e.preventDefault();
    captureBeat(KEY_MAP[e.code]);
    return;
  }
 
  // Also allow clicking cells via keys even outside recording (select/aim)
  if (!isRecording && KEY_MAP[e.code]) {
    e.preventDefault();
    const c = CELLS.find(x => x.id === KEY_MAP[e.code]);
    if (c) handleCellClick(c);
  }
});
 
// ── Export ──
function buildConfig() {
  const spawnTiming = {};
  DIRS.forEach(c => {
    spawnTiming[c.id] = {
      label: c.label,
      key: KEY_DISPLAY[c.id],
      spawnTime: parseFloat(boxState[c.id].spawnTime.toFixed(3)),
      image: boxState[c.id].imageName || null
    };
  });
  return {
    spawnTiming,
    recordedBeats: recordedBeats.map((b, i) => ({
      index: i + 1,
      box: b.id,
      label: CELLS.find(x => x.id === b.id).label,
      key: KEY_DISPLAY[b.id],
      time: parseFloat(b.time.toFixed(3))
    }))
  };
}
 
function toggleExport() {
  const box     = document.getElementById('exportBox');
  const actions = document.getElementById('exportActions');
  if (box.style.display === 'block') {
    box.style.display = 'none';
    actions.style.display = 'none';
    return;
  }
  lastJsonStr = JSON.stringify(buildConfig(), null, 2);
  box.textContent = lastJsonStr;
  box.style.display = 'block';
  actions.style.display = 'flex';
}
 
function downloadJSON() {
  const blob = new Blob([lastJsonStr || JSON.stringify(buildConfig(), null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rhythm_config.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
 
function copyJSON() {
  const str = lastJsonStr || JSON.stringify(buildConfig(), null, 2);
  navigator.clipboard.writeText(str).then(() => {
    statusEl.innerHTML = 'config <span>copied to clipboard</span>';
  }).catch(() => {
    statusEl.innerHTML = '<span style="color:var(--accent3)">clipboard copy failed</span>';
  });
}
</script>

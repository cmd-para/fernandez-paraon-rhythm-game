<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #13131e;
    --border: #2a2a3a;
    --border-active: #7c6fff;
    --accent: #7c6fff;
    --accent-glow: rgba(124,111,255,0.35);
    --accent2: #ff6b9d;
    --text: #e0deff;
    --muted: #44445a;
    --cell: 160px;
    --gap: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px 32px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── GRID ── */
  .grid-wrap { position: relative; display: inline-block; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, var(--cell));
    grid-template-rows: repeat(3, var(--cell));
    gap: var(--gap);
    position: relative;
    z-index: 1;
  }

  .cell {
    width: var(--cell); height: var(--cell);
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    user-select: none;
  }
  .cell:hover { border-color: #4a4a6a; transform: scale(1.02); }
  .cell.active {
    border-color: var(--border-active);
    box-shadow: 0 0 0 1px var(--border-active), 0 0 20px var(--accent-glow);
  }
  .cell.flash { animation: cellFlash 0.2s ease-out; }
  @keyframes cellFlash {
    0%   { box-shadow: 0 0 0 2px var(--accent), 0 0 32px var(--accent-glow); }
    100% { box-shadow: none; }
  }
  .cell img {
    width: 100%; height: 100%; object-fit: cover;
    position: absolute; inset: 0; border-radius: 8px; pointer-events: none;
  }
  .cell-label {
    font-size: 9px; color: var(--muted); letter-spacing: 0.12em;
    text-align: center; z-index: 1; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
  }
  .cell-label svg { opacity: 0.3; }

  .cell.center { cursor: default; border-color: #2e2e44; background: #0c0c16; }
  .cell.center:hover { transform: none; border-color: #2e2e44; }

  #aimCanvas { position: absolute; inset: 0; pointer-events: none; z-index: 0; }

  /* ── TIMING PANEL ── */
  .timing-panel {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .timing-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: 0.15em; color: var(--muted);
  }

  .timing-header span { color: var(--accent); }

  .timing-rows { display: flex; flex-direction: column; }

  .timing-row {
    display: grid;
    grid-template-columns: 110px 1fr 110px 100px;
    align-items: center;
    gap: 10px;
    padding: 9px 18px;
    border-bottom: 1px solid #1a1a26;
    transition: background 0.1s;
  }
  .timing-row:last-child { border-bottom: none; }
  .timing-row:hover { background: #16161f; }
  .timing-row.row-active { background: #1a1828; }

  .row-id {
    font-size: 10px; color: var(--muted); letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 8px;
  }
  .row-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
    transition: background 0.15s;
  }
  .row-dot.has-image { background: var(--accent2); }
  .row-dot.row-active-dot { background: var(--accent); }

  .timing-input-wrap {
    display: flex; align-items: center; gap: 6px;
  }

  .timing-input-wrap input[type=range] {
    flex: 1; height: 3px; appearance: none;
    background: var(--border); border-radius: 2px; cursor: pointer;
    outline: none;
  }
  .timing-input-wrap input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 13px; height: 13px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }
  .timing-input-wrap input[type=range]::-moz-range-thumb {
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
  }

  .timing-val {
    font-size: 11px; color: var(--text); min-width: 52px; text-align: right;
    letter-spacing: 0.05em;
  }

  .upload-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    padding: 5px 10px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 5px;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .upload-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .upload-btn.has-image { border-color: #3a3050; color: var(--accent2); }

  /* ── SHOOTER TOOLBAR ── */
  .shooter-toolbar {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    max-width: 560px;
  }
  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    padding: 7px 14px;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .btn:hover { border-color: var(--accent); background: #1a1a28; }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: var(--accent); color: #fff; }

  .section-label {
    font-size: 10px; color: var(--muted); letter-spacing: 0.2em;
    text-align: center; text-transform: uppercase;
  }

  .status {
    font-size: 11px; color: var(--muted); letter-spacing: 0.1em;
    min-height: 16px; text-align: center;
  }
  .status span { color: var(--accent); }

  /* ── EXPORT ── */
  .export-box {
    width: 100%; max-width: 560px;
    background: #0d0d18; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    font-size: 11px; line-height: 1.8; color: #7070a0;
    white-space: pre; overflow-x: auto; display: none;
  }

  input[type=file] { display: none; }
</style>
</head>
<body>

<h1>Rhythm Game &mdash; Template</h1>

<!-- GRID -->
<div class="grid-wrap">
  <canvas id="aimCanvas"></canvas>
  <div class="grid" id="grid"></div>
</div>

<div class="status" id="status">click a box to aim</div>

<!-- SHOOTER IMAGES -->
<div class="section-label">Shooter images</div>
<div class="shooter-toolbar" id="shooterToolbar"></div>

<!-- ENEMY IMAGES + TIMING -->
<div class="section-label">Enemy images &amp; timing</div>
<div class="timing-panel">
  <div class="timing-header">
    <span>BOX</span>
    <span style="flex:1;text-align:center;margin:0 10px;">SPAWN TIMING (seconds into song)</span>
    <span>IMAGE</span>
  </div>
  <div class="timing-rows" id="timingRows"></div>
</div>

<!-- EXPORT -->
<button class="btn" onclick="toggleExport()" style="align-self:center;">export timing config ↓</button>
<pre class="export-box" id="exportBox"></pre>

<input type="file" id="fileInput" accept="image/*">

<script>
/* ============================================================
   SHOOTER IMAGE PATHS — edit these to your files.
   Leave "" to use no image for that direction.
   ============================================================ */
const SHOOTER_IMAGES = {
  idle: "images/shooter_idle.png",
  tl:   "images/shooter_tl.png",
  tc:   "images/shooter_tc.png",
  tr:   "images/shooter_tr.png",
  ml:   "images/shooter_ml.png",
  mr:   "images/shooter_mr.png",
  bl:   "images/shooter_bl.png",
  bc:   "images/shooter_bc.png",
  br:   "images/shooter_br.png",
};
/* ============================================================ */

const CELLS = [
  { id:'tl', label:'TOP-LEFT'     },
  { id:'tc', label:'TOP'          },
  { id:'tr', label:'TOP-RIGHT'    },
  { id:'ml', label:'LEFT'         },
  { id:'center', label:'SHOOTER'  },
  { id:'mr', label:'RIGHT'        },
  { id:'bl', label:'BOTTOM-LEFT'  },
  { id:'bc', label:'BOTTOM'       },
  { id:'br', label:'BOTTOM-RIGHT' },
];

const DIRS = CELLS.filter(c => c.id !== 'center');

/* per-box state */
const boxState = {};
DIRS.forEach(c => {
  boxState[c.id] = {
    imageSrc:  null,
    imageName: null,
    spawnTime: 0,   // seconds
  };
});

let activeId      = null;
let pendingUpload = null;

const gridEl      = document.getElementById('grid');
const statusEl    = document.getElementById('status');
const fileInput   = document.getElementById('fileInput');
const timingRows  = document.getElementById('timingRows');
const shooterTbar = document.getElementById('shooterToolbar');
const canvas      = document.getElementById('aimCanvas');
const ctx         = canvas.getContext('2d');

/* ── build grid ── */
CELLS.forEach(c => {
  const cell = document.createElement('div');
  cell.className = 'cell' + (c.id === 'center' ? ' center' : '');
  cell.id = 'cell-' + c.id;
  cell.innerHTML = `
    <div class="cell-label" id="label-${c.id}">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2.5" y="2.5" width="15" height="15" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10" y1="5.5" x2="10" y2="14.5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="5.5" y1="10" x2="14.5" y2="10" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      <span>${c.label}</span>
    </div>`;
  if (c.id !== 'center') cell.addEventListener('click', () => handleClick(c));
  gridEl.appendChild(cell);
});

setCenterImage('idle');

/* ── build shooter toolbar ── */
const shooterKeys = ['idle', ...DIRS.map(d => d.id)];
shooterKeys.forEach(key => {
  const label = key === 'idle' ? 'idle' : DIRS.find(d => d.id === key).label.toLowerCase();
  const btn = document.createElement('button');
  btn.className = key === 'idle' ? 'btn primary' : 'btn';
  btn.textContent = key === 'idle' ? '+ shooter idle' : `aim → ${label}`;
  btn.onclick = () => triggerUpload('shooter-' + key);
  shooterTbar.appendChild(btn);
});

/* ── build timing rows ── */
DIRS.forEach(c => {
  const row = document.createElement('div');
  row.className = 'timing-row';
  row.id = 'row-' + c.id;
  row.innerHTML = `
    <div class="row-id">
      <div class="row-dot" id="dot-${c.id}"></div>
      <span>${c.label}</span>
    </div>
    <div class="timing-input-wrap">
      <input type="range" id="slider-${c.id}" min="0" max="300" step="0.1" value="0">
    </div>
    <div class="timing-val" id="val-${c.id}">0.0s</div>
    <button class="upload-btn" id="ubtn-${c.id}" onclick="triggerUpload('enemy-${c.id}')">+ image</button>
  `;
  timingRows.appendChild(row);

  document.getElementById('slider-' + c.id).addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    boxState[c.id].spawnTime = v;
    document.getElementById('val-' + c.id).textContent = v.toFixed(1) + 's';
  });
});

/* ── cell click (aim) ── */
function handleClick(c) {
  const wasActive = activeId === c.id;
  document.querySelectorAll('.cell').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.timing-row').forEach(el => el.classList.remove('row-active'));
  activeId = null;
  drawAim(null);

  if (wasActive) {
    setCenterImage('idle');
    statusEl.innerHTML = `deselected`;
    return;
  }

  activeId = c.id;
  const el = document.getElementById('cell-' + c.id);
  el.classList.add('active', 'flash');
  el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });

  document.getElementById('row-' + c.id).classList.add('row-active');
  document.getElementById('dot-' + c.id).classList.add('row-active-dot');

  drawAim(c.id);
  setCenterImage(c.id);
  statusEl.innerHTML = `aimed at <span>${c.label}</span> &mdash; spawn @ <span>${boxState[c.id].spawnTime.toFixed(1)}s</span>`;
}

/* ── shooter image ── */
const shooterImages = { ...SHOOTER_IMAGES };  // starts from file paths, overridden by upload

function setCenterImage(key) {
  const center = document.getElementById('cell-center');
  center.querySelectorAll('img').forEach(i => i.remove());
  const src = shooterImages[key] || shooterImages['idle'];
  const label = document.getElementById('label-center');
  if (src) {
    const img = document.createElement('img');
    img.src = src; img.alt = 'shooter';
    img.onerror = () => { img.remove(); if (label) label.style.display = ''; };
    center.prepend(img);
    if (label) label.style.display = 'none';
  } else {
    if (label) label.style.display = '';
  }
}

/* ── enemy image in grid cell ── */
function setEnemyImage(id, src) {
  const cell = document.getElementById('cell-' + id);
  cell.querySelectorAll('img').forEach(i => i.remove());
  if (src) {
    const img = document.createElement('img');
    img.src = src; img.alt = id;
    cell.prepend(img);
    document.getElementById('label-' + id).style.display = 'none';
  } else {
    document.getElementById('label-' + id).style.display = '';
  }
}

/* ── file upload ── */
function triggerUpload(target) {
  pendingUpload = target;
  fileInput.value = '';
  fileInput.click();
}

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file || !pendingUpload) return;
  const reader = new FileReader();
  reader.onload = e => {
    const src  = e.target.result;
    const key  = pendingUpload;

    if (key.startsWith('shooter-')) {
      const id = key.replace('shooter-', '');
      shooterImages[id] = src;
      if (activeId === id || (id === 'idle' && !activeId)) setCenterImage(id === 'idle' ? 'idle' : activeId);
      statusEl.innerHTML = `shooter image updated for <span>${id}</span>`;

    } else if (key.startsWith('enemy-')) {
      const id = key.replace('enemy-', '');
      boxState[id].imageSrc  = src;
      boxState[id].imageName = file.name;
      setEnemyImage(id, src);

      const btn = document.getElementById('ubtn-' + id);
      btn.textContent = '✓ ' + file.name.slice(0, 12) + (file.name.length > 12 ? '…' : '');
      btn.classList.add('has-image');
      document.getElementById('dot-' + id).classList.add('has-image');
      document.getElementById('dot-' + id).classList.remove('row-active-dot');

      statusEl.innerHTML = `enemy image set for <span>${id}</span>`;
    }
  };
  reader.readAsDataURL(file);
});

/* ── aim canvas ── */
function sizeCanvas() {
  const wrap = canvas.parentElement.getBoundingClientRect();
  canvas.width = wrap.width; canvas.height = wrap.height;
}

function drawAim(targetId) {
  sizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!targetId) return;

  const wrap = canvas.parentElement.getBoundingClientRect();
  const cR = document.getElementById('cell-center').getBoundingClientRect();
  const tR = document.getElementById('cell-' + targetId).getBoundingClientRect();

  const cx = cR.left - wrap.left + cR.width  / 2;
  const cy = cR.top  - wrap.top  + cR.height / 2;
  const tx = tR.left - wrap.left + tR.width  / 2;
  const ty = tR.top  - wrap.top  + tR.height / 2;

  ctx.save();
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(tx, ty);
  ctx.strokeStyle = 'rgba(124,111,255,0.5)';
  ctx.lineWidth = 1.5; ctx.setLineDash([5,5]); ctx.stroke();

  const angle = Math.atan2(ty - cy, tx - cx);
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx - 9 * Math.cos(angle - 0.4), ty - 9 * Math.sin(angle - 0.4));
  ctx.lineTo(tx - 9 * Math.cos(angle + 0.4), ty - 9 * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fillStyle = 'rgba(124,111,255,0.75)'; ctx.fill();
  ctx.restore();
}

window.addEventListener('resize', () => { if (activeId) drawAim(activeId); });

/* ── export timing config ── */
function toggleExport() {
  const box = document.getElementById('exportBox');
  if (box.style.display === 'block') { box.style.display = 'none'; return; }

  const config = {};
  DIRS.forEach(c => {
    config[c.id] = {
      label:     c.label,
      spawnTime: parseFloat(boxState[c.id].spawnTime.toFixed(1)),
      image:     boxState[c.id].imageName || '(not set)',
    };
  });

  box.textContent = '// Copy this into your game logic:\nconst BEAT_TIMING = ' + JSON.stringify(config, null, 2) + ';';
  box.style.display = 'block';
}
</script>
</body>
</html>

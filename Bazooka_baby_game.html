<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreeBySound</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --bg: #08080f;
            --panel: #0f0f1a;
            --border: #1e1e30;
            --accent: #7c6fff;
            --miss: #ff5555;
            --hit: #50fa7b;
            --hit300: #0300aa;
            --hit100: #f1fa8c;
            --hit50: #ffb86c;
            --text: #e0deff;
            --muted: #3a3a55;
            --cell: 110px;
            --gap: 20px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            overflow: hidden;
            margin: 0;
        }

        .import-zone {
            display: flex;
            gap: 10px;
            background: var(--panel);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .file-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .file-group label {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .file-group .file-name {
            font-size: 9px;
            color: var(--accent);
            min-height: 12px;
        }

        input[type="file"] {
            font-size: 10px;
            color: var(--accent);
        }

        .score-display {
            font-family: 'Orbitron';
            font-size: 32px;
            color: var(--accent);
        }

        .speed-ctrl {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: var(--panel);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .speed-ctrl label {
            font-size: 10px;
            color: var(--muted);
        }

        .game-container {
            position: relative;
            padding: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, var(--cell));
            grid-template-rows: repeat(3, var(--cell));
            gap: var(--gap);
            position: relative;
            z-index: 2;
        }

        .cell {
            width: var(--cell);
            height: var(--cell);
            background: rgba(15, 15, 26, 0.95);
            border: 2px solid var(--border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* center placeholder — invisible, just holds grid layout */
        .cell.center-placeholder {
            background: transparent;
            border-color: transparent;
            pointer-events: none;
        }

        .cell.pressed {
            background: #1a1a2e;
            border-color: var(--accent);
            transform: scale(0.92);
        }

        .cell-key {
            font-size: 20px;
            color: var(--accent);
            font-weight: 900;
        }

        .cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            border-radius: 13px;
            pointer-events: none;
        }

        .note {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            pointer-events: none;
            z-index: 5;
            transition: background 0.3s, opacity 0.3s;
        }

        .note.missed {
            background: var(--miss) !important;
            opacity: 0;
            transform: scale(0.2) !important;
        }

        @keyframes pop-ring {
            0% { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
        }

        @keyframes pop-particle {
            0% { opacity: 1; transform: translate(var(--dx0), var(--dy0)) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx1), var(--dy1)) scale(0); }
        }

        @keyframes pop-score {
            0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            60% { opacity: 1; transform: translate(-50%, -22px) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -38px) scale(0.9); }
        }

        .pop-ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            left: 50%;
            top: 50%;
            width: 44px;
            height: 44px;
            border: 3px solid var(--hit);
            animation: pop-ring 0.38s ease-out forwards;
        }

        .pop-ring.ring2 {
            border-color: var(--accent);
            animation-delay: 0.06s;
            animation-duration: 0.42s;
        }

        .pop-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            width: 8px;
            height: 8px;
            left: 50%;
            top: 50%;
            animation: pop-particle 0.42s ease-out forwards;
        }

        .pop-score {
            position: absolute;
            pointer-events: none;
            z-index: 11;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            left: 50%;
            bottom: 50%;
            animation: pop-score 0.55s ease-out forwards;
            white-space: nowrap;
        }

        .pop-score.t300 { color: var(--hit300); font-size: 15px; }
        .pop-score.t100 { color: var(--hit100); font-size: 13px; }
        .pop-score.t50  { color: var(--hit50);  font-size: 11px; }

        .status-bar {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            min-height: 14px;
            text-align: center;
        }

        .status-bar span { color: var(--accent); }
        .status-bar span.err { color: var(--miss); }

        .btn {
            padding: 12px 24px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 11px;
            border-radius: 6px;
            transition: border-color 0.15s, background 0.15s;
        }

        .btn:hover:not(:disabled) { border-color: var(--accent); background: #1a1a28; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn.danger { border-color: var(--miss); color: var(--miss); }
        .btn.danger:hover:not(:disabled) { background: rgba(255, 85, 85, 0.1); border-color: var(--miss); }

        .btn-row { display: flex; gap: 10px; align-items: center; }

        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(8, 8, 15, 0.85);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .confirm-overlay.visible { display: flex; }

        .confirm-box {
            background: var(--panel);
            border: 1px solid var(--miss);
            border-radius: 12px;
            padding: 32px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 40px rgba(255, 85, 85, 0.2);
        }

        .confirm-box .confirm-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 0.2em;
            color: var(--miss);
            text-transform: uppercase;
        }

        .confirm-box .confirm-sub {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-align: center;
        }

        .confirm-actions { display: flex; gap: 12px; }
    </style>
</head>

<body>

    <div class="import-zone">
        <div class="file-group">
            <label>1. Audio (MP3)</label>
            <input type="file" id="audioInput" accept="audio/*">
            <span class="file-name" id="audioName">—</span>
        </div>
        <div class="file-group">
            <label>2. Chart (JSON)</label>
            <input type="file" id="chartInput" accept=".json">
            <span class="file-name" id="chartName">—</span>
        </div>
    </div>

    <div class="speed-ctrl">
        <label id="speedLabel">NOTE LEAD TIME: 2.5s</label>
        <input type="range" id="speedSlider" min="0.5" max="5.0" step="0.1" value="2.5">
    </div>

    <div class="score-display" id="score">000000</div>

    <div class="game-container" id="gameArea">
        <div class="grid" id="grid"></div>
    </div>

    <div class="status-bar" id="statusBar">load an mp3 and a json chart to begin</div>

    <div class="btn-row">
        <button class="btn" id="btnPlay" onclick="togglePlay()" disabled>WAITING FOR FILES...</button>
        <button class="btn danger" id="btnRestart" onclick="askRestart()" disabled>&#8635; RESTART</button>
    </div>

    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <div class="confirm-title">&#9888; Restart?</div>
            <div class="confirm-sub">your current score will be lost.<br>this cannot be undone.</div>
            <div class="confirm-actions">
                <button class="btn danger" onclick="confirmRestart()">YES, RESTART</button>
                <button class="btn" onclick="cancelRestart()">CANCEL</button>
            </div>
        </div>
    </div>

    <audio id="gameAudio"></audio>

    <script>
        const KEY_MAP = { 'q': 'tl', 'w': 'tc', 'e': 'tr', 'a': 'ml', 'd': 'mr', 'z': 'bl', 'x': 'bc', 'c': 'br' };

        // Center cell is now a blank placeholder — no key, no id for hits
        const CELLS = [
            { id: 'tl', k: 'Q' }, { id: 'tc', k: 'W' }, { id: 'tr', k: 'E' },
            { id: 'ml', k: 'A' }, { id: 'center', k: null }, { id: 'mr', k: 'D' },
            { id: 'bl', k: 'Z' }, { id: 'bc', k: 'X' }, { id: 'br', k: 'C' }
        ];

        let approachTime = 2.5;
        const OFFSET = 800;
        let beats = [];
        let activeNotes = [];
        let score = 0;
        let isPlaying = false;
        let audioReady = false;
        let chartReady = false;

        const audioPlayer = document.getElementById('gameAudio');
        const btnPlay = document.getElementById('btnPlay');
        const btnRestart = document.getElementById('btnRestart');
        const statusBar = document.getElementById('statusBar');
        const confirmOverlay = document.getElementById('confirmOverlay');

        const gridEl = document.getElementById('grid');
        CELLS.forEach(c => {
            const cell = document.createElement('div');
            if (c.id === 'center') {
                // Invisible placeholder to keep grid layout intact
                cell.className = 'cell center-placeholder';
            } else {
                cell.className = 'cell';
                cell.id = `cell-${c.id}`;
                cell.innerHTML = `<span class="cell-key">${c.k}</span>`;
            }
            gridEl.appendChild(cell);
        });

        document.getElementById('audioInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            audioPlayer.src = URL.createObjectURL(file);
            document.getElementById('audioName').textContent = file.name;
            audioReady = true;
            checkReady();
        };

        document.getElementById('chartInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    const rawBeats = data.recordedBeats || data.RECORDED_BEATS;
                    if (!rawBeats || !Array.isArray(rawBeats)) {
                        statusBar.innerHTML = '<span class="err">JSON error: no recordedBeats array found</span>';
                        return;
                    }
                    beats = rawBeats.map(b => ({ box: b.box, time: b.time, spawned: false, hit: false }));
                    document.getElementById('chartName').textContent = file.name + ' (' + beats.length + ' beats)';
                    chartReady = true;
                    checkReady();
                } catch (err) {
                    statusBar.innerHTML = '<span class="err">JSON parse error: ' + err.message + '</span>';
                }
            };
            reader.readAsText(file);
        };

        function checkReady() {
            if (audioReady && chartReady) {
                btnPlay.disabled = false;
                btnPlay.textContent = 'START GAME';
                btnRestart.disabled = false;
                statusBar.innerHTML = 'ready — <span>' + beats.length + ' beats</span> loaded';
            } else if (audioReady) {
                statusBar.innerHTML = 'audio loaded — <span>waiting for chart json</span>';
            } else if (chartReady) {
                statusBar.innerHTML = 'chart loaded — <span>waiting for audio</span>';
            }
        }

        document.getElementById('speedSlider').oninput = (e) => {
            approachTime = parseFloat(e.target.value);
            document.getElementById('speedLabel').textContent = `NOTE LEAD TIME: ${approachTime.toFixed(1)}s`;
        };

        window.addEventListener('keydown', e => {
            if (e.repeat) return;
            const cid = KEY_MAP[e.key.toLowerCase()];
            if (cid) { document.getElementById(`cell-${cid}`).classList.add('pressed'); checkHit(cid); }
        });
        window.addEventListener('keyup', e => {
            const cid = KEY_MAP[e.key.toLowerCase()];
            if (cid) document.getElementById(`cell-${cid}`).classList.remove('pressed');
        });

        function togglePlay() {
            if (!isPlaying) {
                if (audioPlayer.currentTime === 0 || audioPlayer.ended) {
                    beats.forEach(b => { b.spawned = false; b.hit = false; });
                    activeNotes.forEach(n => n.el.remove());
                    activeNotes = [];
                    score = 0;
                    document.getElementById('score').textContent = '000000';
                }
                audioPlayer.play();
                isPlaying = true;
                btnPlay.textContent = 'PAUSE';
                statusBar.innerHTML = '<span>playing</span>';
                gameLoop();
            } else {
                audioPlayer.pause();
                isPlaying = false;
                btnPlay.textContent = 'RESUME';
                statusBar.innerHTML = 'paused';
            }
        }

        audioPlayer.addEventListener('ended', () => {
            isPlaying = false;
            btnPlay.textContent = 'RESTART';
            statusBar.innerHTML = 'finished — score: <span>' + score + '</span>';
            audioPlayer.currentTime = 0;
            beats.forEach(b => { b.spawned = false; b.hit = false; });
            activeNotes.forEach(n => n.el.remove());
            activeNotes = [];
        });

        function gameLoop() {
            if (!isPlaying) return;
            const now = audioPlayer.currentTime;
            beats.forEach(b => {
                if (!b.spawned && b.time - approachTime <= now) {
                    const el = document.createElement('div');
                    el.className = 'note';
                    document.getElementById('gameArea').appendChild(el);
                    activeNotes.push({ ...b, el, currentApproach: approachTime });
                    b.spawned = true;
                }
            });
            updateNotes(now);
            requestAnimationFrame(gameLoop);
        }

        function updateNotes(now) {
            for (let i = activeNotes.length - 1; i >= 0; i--) {
                const n = activeNotes[i];
                const progress = (now - (n.time - n.currentApproach)) / n.currentApproach;

                if (progress > 1.1) {
                    n.el.classList.add('missed');
                    setTimeout(() => n.el.remove(), 300);
                    activeNotes.splice(i, 1);
                    continue;
                }

                const target = document.getElementById(`cell-${n.box}`);
                if (!target) { activeNotes.splice(i, 1); continue; }

                const rect = target.getBoundingClientRect();
                const areaRect = document.getElementById('gameArea').getBoundingClientRect();

                const tx = rect.left - areaRect.left + (rect.width / 2) - 22;
                const ty = rect.top - areaRect.top + (rect.height / 2) - 22;

                let sx = tx, sy = ty;
                if (n.box.includes('t')) sy -= OFFSET;
                if (n.box.includes('b')) sy += OFFSET;
                if (n.box.includes('l')) sx -= OFFSET;
                if (n.box.includes('r')) sx += OFFSET;

                const p = Math.max(0, progress);
                n.el.style.left = (sx + (tx - sx) * p) + 'px';
                n.el.style.top = (sy + (ty - sy) * p) + 'px';
                n.el.style.transform = `scale(${0.5 + Math.min(p, 1) * 0.5})`;
            }
        }

        function getTier(delta) {
            if (delta <= 0.08) return { points: 300, tierClass: 't300', ringColor: '#50fa7b', particleColors: ['#50fa7b', '#b8ffcc', '#ffffff', '#50fa7b', '#b8ffcc', '#ffffff', '#50fa7b', '#b8ffcc'] };
            if (delta <= 0.15) return { points: 100, tierClass: 't100', ringColor: '#f1fa8c', particleColors: ['#f1fa8c', '#fffab0', '#ffffff', '#f1fa8c', '#fffab0', '#ffffff', '#f1fa8c', '#fffab0'] };
            return { points: 50, tierClass: 't50', ringColor: '#ffb86c', particleColors: ['#ffb86c', '#ffd4a8', '#ffffff', '#ffb86c', '#ffd4a8', '#ffffff', '#ffb86c', '#ffd4a8'] };
        }

        function spawnBurst(x, y, ringColor, particleColors) {
            const area = document.getElementById('gameArea');
            for (let r = 0; r < 2; r++) {
                const ring = document.createElement('div');
                ring.className = 'pop-ring' + (r === 1 ? ' ring2' : '');
                ring.style.left = x + 'px';
                ring.style.top = y + 'px';
                ring.style.borderColor = ringColor;
                area.appendChild(ring);
                setTimeout(() => ring.remove(), 550);
            }
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const dist = 28 + Math.random() * 20;
                const p = document.createElement('div');
                p.className = 'pop-particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.background = particleColors[i];
                p.style.setProperty('--dx0', '0px');
                p.style.setProperty('--dy0', '0px');
                p.style.setProperty('--dx1', (Math.cos(angle) * dist) + 'px');
                p.style.setProperty('--dy1', (Math.sin(angle) * dist) + 'px');
                area.appendChild(p);
                setTimeout(() => p.remove(), 500);
            }
        }

        function spawnScorePopup(x, y, points, tierClass) {
            const area = document.getElementById('gameArea');
            const el = document.createElement('div');
            el.className = 'pop-score ' + tierClass;
            el.textContent = '+' + points;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            area.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        function checkHit(cid) {
            if (!isPlaying) return;
            const now = audioPlayer.currentTime;

            // Collect all active notes in this cell within the hit window
            const candidates = activeNotes
                .map((n, i) => ({ n, i, delta: Math.abs(n.time - now) }))
                .filter(({ n, delta }) => n.box === cid && delta < 0.25);

            // Only register the FIRST (earliest/closest upcoming) note — sort by note.time ascending
            if (candidates.length === 0) return;
            candidates.sort((a, b) => a.n.time - b.n.time);
            const { n, i: idx } = candidates[0];

            const delta = Math.abs(n.time - now);
            const tier = getTier(delta);

            score += tier.points;
            document.getElementById('score').textContent = score.toString().padStart(6, '0');

            const noteRect = n.el.getBoundingClientRect();
            const areaRect = document.getElementById('gameArea').getBoundingClientRect();
            const bx = noteRect.left - areaRect.left + noteRect.width / 2;
            const by = noteRect.top - areaRect.top + noteRect.height / 2;

            n.el.remove();
            activeNotes.splice(idx, 1);

            spawnBurst(bx, by, tier.ringColor, tier.particleColors);
            spawnScorePopup(bx, by, tier.points, tier.tierClass);

            const cell = document.getElementById(`cell-${cid}`);
            cell.style.borderColor = tier.ringColor;
            cell.style.boxShadow = `0 0 12px ${tier.ringColor}`;
            setTimeout(() => { cell.style.borderColor = ''; cell.style.boxShadow = ''; }, 150);
        }

        function askRestart() {
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                btnPlay.textContent = 'RESUME';
            }
            confirmOverlay.classList.add('visible');
        }

        function cancelRestart() {
            confirmOverlay.classList.remove('visible');
        }

        function confirmRestart() {
            confirmOverlay.classList.remove('visible');
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            isPlaying = false;
            score = 0;
            document.getElementById('score').textContent = '000000';
            beats.forEach(b => { b.spawned = false; b.hit = false; });
            activeNotes.forEach(n => n.el.remove());
            activeNotes = [];
            btnPlay.textContent = 'START GAME';
            statusBar.innerHTML = 'restarted — <span>' + beats.length + ' beats</span> loaded';
        }

        document.getElementById('confirmOverlay').addEventListener('click', function (e) {
            if (e.target === this) cancelRestart();
        });
    </script>
</body>

</html>
